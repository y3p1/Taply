services:
  db:
    image: postgres:16-alpine
    container_name: taply-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: taply
      POSTGRES_USER: taply_user
      POSTGRES_PASSWORD: taply_dev_password
    volumes:
      - taply_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taply_user -d taply"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  taply_pgdata:
